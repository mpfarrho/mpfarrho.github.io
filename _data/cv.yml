# Drives the home page CV sections (see _layouts/home.liquid).
# Each section: id (must match the mockup + scroll-spy verbatim), nav (TOC
# label), title (h2), and an ordered list of typed blocks:
#   - type: entry    -> role / org / date ledger row (.entry)
#   - type: sub      -> serif-italic subheading (.sub)
#   - type: deflist  -> label/value rows (.deflist), one <dl> per block
#   - type: personal -> the "Off the clock" box (.personal)
# Values may contain inline HTML (links, entities); they are emitted raw.

